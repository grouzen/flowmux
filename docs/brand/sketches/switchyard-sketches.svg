<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Flowmux switchyard monogram sketches</title>
  <desc id="desc">Twenty black-only mark sketches exploring a switchyard monogram direction for Flowmux.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #dbe4ee; stroke-width: 2; }
      .ink { fill: #0b1020; }
      .stroke { fill: none; stroke: #0b1020; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #0b1020; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #64748b; font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .title { fill: #0b1020; font: 760 46px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .note { fill: #64748b; font: 500 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1200" class="bg"/>
  <text x="80" y="82" class="title">Flowmux switchyard monogram sketches</text>
  <text x="80" y="122" class="note">Black-only thumbnails. Judge silhouette, not finish. No gradients, windows, or node graphs.</text>

  <g transform="translate(80 170)">
    <g transform="translate(0 0)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">01 / forked f</text>
      <g transform="translate(78 58)">
        <path class="stroke" d="M42 112V28H94C118 28 132 42 132 62C132 82 118 96 94 96H64"/>
        <path class="stroke" d="M42 62H104"/>
      </g>
    </g>

    <g transform="translate(300 0)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">02 / rail switch</text>
      <g transform="translate(72 58)">
        <path class="stroke" d="M40 112V30"/>
        <path class="stroke" d="M40 62H118"/>
        <path class="stroke" d="M40 112C62 112 82 99 98 82L130 48"/>
      </g>
    </g>

    <g transform="translate(600 0)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">03 / mux bend</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 114V28"/>
        <path class="stroke" d="M42 60H104C124 60 136 72 136 88C136 104 124 116 104 116H78"/>
      </g>
    </g>

    <g transform="translate(900 0)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">04 / split lane</text>
      <g transform="translate(72 58)">
        <path class="stroke" d="M40 112V30"/>
        <path class="stroke" d="M40 70H128"/>
        <path class="thin" d="M76 70L128 30"/>
        <path class="thin" d="M76 70L128 112"/>
      </g>
    </g>

    <g transform="translate(1200 0)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">05 / negative fork</text>
      <g transform="translate(68 54)">
        <path class="ink" fill-rule="evenodd" d="M38 124V18H72V58H120C140 58 154 72 154 92C154 112 140 126 120 126H90V94H118C122 94 126 91 126 87C126 83 122 80 118 80H72V124H38Z"/>
      </g>
    </g>

    <g transform="translate(0 230)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">06 / scan f</text>
      <g transform="translate(66 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 58H132"/>
        <path class="thin" d="M80 28H132"/>
        <path class="thin" d="M80 88H122"/>
        <path class="thin" d="M80 112H112"/>
      </g>
    </g>

    <g transform="translate(300 230)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">07 / bracket mux</text>
      <g transform="translate(64 58)">
        <path class="stroke" d="M58 30H38V112H58"/>
        <path class="stroke" d="M116 30H136V112H116"/>
        <path class="thin" d="M62 54H104C121 54 132 63 132 72C132 81 121 90 104 90H62"/>
      </g>
    </g>

    <g transform="translate(600 230)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">08 / clamp path</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M44 114V28"/>
        <path class="stroke" d="M44 58H116"/>
        <path class="stroke" d="M88 28C122 28 142 48 142 72C142 96 122 116 88 116"/>
      </g>
    </g>

    <g transform="translate(900 230)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">09 / terminal slash</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H112"/>
        <path class="stroke" d="M92 28L136 62L92 96"/>
      </g>
    </g>

    <g transform="translate(1200 230)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">10 / folded f</text>
      <g transform="translate(72 58)">
        <path class="stroke" d="M42 112V28H104"/>
        <path class="stroke" d="M42 62H118"/>
        <path class="stroke" d="M118 62C118 92 98 112 68 112"/>
      </g>
    </g>

    <g transform="translate(0 460)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">11 / turnout</text>
      <g transform="translate(72 58)">
        <path class="stroke" d="M42 112V30"/>
        <path class="stroke" d="M42 68H132"/>
        <path class="thin" d="M42 112C74 105 96 89 112 68"/>
      </g>
    </g>

    <g transform="translate(300 460)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">12 / route hook</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 114V28"/>
        <path class="stroke" d="M42 58H112"/>
        <path class="stroke" d="M112 58C136 58 148 72 148 88C148 104 136 116 112 116"/>
      </g>
    </g>

    <g transform="translate(600 460)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">13 / switch glyph</text>
      <g transform="translate(64 58)">
        <path class="stroke" d="M40 112V28"/>
        <path class="stroke" d="M40 70H100"/>
        <path class="stroke" d="M100 70L140 30"/>
        <path class="stroke" d="M100 70L140 112"/>
      </g>
    </g>

    <g transform="translate(900 460)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">14 / worktree fork</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H118"/>
        <path class="thin" d="M78 62V112"/>
        <path class="thin" d="M118 62V112"/>
      </g>
    </g>

    <g transform="translate(1200 460)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">15 / pane implied</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H126"/>
        <path class="thin" d="M82 28V112"/>
        <path class="thin" d="M126 28V112"/>
      </g>
    </g>

    <g transform="translate(0 690)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">16 / signal f</text>
      <g transform="translate(68 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H104"/>
        <path class="thin" d="M90 30C122 38 140 58 144 86"/>
        <path class="thin" d="M90 112C122 104 140 84 144 56"/>
      </g>
    </g>

    <g transform="translate(300 690)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">17 / mux ligature</text>
      <g transform="translate(64 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H92"/>
        <path class="stroke" d="M92 62C122 62 140 80 140 112"/>
        <path class="stroke" d="M92 62C122 62 140 44 140 28"/>
      </g>
    </g>

    <g transform="translate(600 690)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">18 / command fork</text>
      <g transform="translate(66 58)">
        <path class="stroke" d="M40 34L78 72L40 110"/>
        <path class="stroke" d="M82 72H142"/>
        <path class="thin" d="M104 72L142 34"/>
        <path class="thin" d="M104 72L142 110"/>
      </g>
    </g>

    <g transform="translate(900 690)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">19 / stitched f</text>
      <g transform="translate(68 58)">
        <path class="stroke" d="M42 112V28"/>
        <path class="stroke" d="M42 62H132"/>
        <path class="thin" d="M82 28H132"/>
        <path class="thin" d="M82 92H122"/>
      </g>
    </g>

    <g transform="translate(1200 690)">
      <rect class="card" width="260" height="190" rx="18"/>
      <text x="22" y="38" class="label">20 / hard turn</text>
      <g transform="translate(70 58)">
        <path class="stroke" d="M42 112V28H104"/>
        <path class="stroke" d="M42 62H134"/>
        <path class="stroke" d="M104 28L134 62L104 96"/>
      </g>
    </g>
  </g>
</svg>
