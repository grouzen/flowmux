<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Flowmux logo</title>
  <desc id="desc">Flowmux wordmark with a terminal pane mark and routed flow path.</desc>
  <defs>
    <linearGradient id="shell" x1="46" y1="34" x2="302" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#06090f"/>
    </linearGradient>
    <linearGradient id="flow" x1="96" y1="104" x2="276" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66e3ff"/>
      <stop offset="0.56" stop-color="#4ef2b2"/>
      <stop offset="1" stop-color="#ff5db8"/>
    </linearGradient>
    <linearGradient id="word" x1="388" y1="110" x2="1000" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.72" stop-color="#172033"/>
      <stop offset="1" stop-color="#274155"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="0" fill="#ffffff"/>

  <g filter="url(#soft-shadow)">
    <rect x="38" y="38" width="284" height="284" rx="62" fill="url(#shell)"/>
    <rect x="51" y="51" width="258" height="258" rx="49" fill="none" stroke="#263241" stroke-width="8"/>
  </g>

  <path d="M70 104H290" stroke="#263241" stroke-width="9" stroke-linecap="round"/>
  <circle cx="92" cy="78" r="8" fill="#ff5d73"/>
  <circle cx="119" cy="78" r="8" fill="#ffc857"/>
  <circle cx="146" cy="78" r="8" fill="#4ef2b2"/>

  <path d="M180 125V280" stroke="#1d2733" stroke-width="7" stroke-linecap="round"/>
  <path d="M76 193H284" stroke="#1d2733" stroke-width="7" stroke-linecap="round"/>
  <path d="M230 125V193" stroke="#1d2733" stroke-width="7" stroke-linecap="round"/>

  <path
    d="M101 255V138H217C246 138 270 162 270 191C270 220 246 244 217 244H166"
    fill="none"
    stroke="url(#flow)"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <path
    d="M101 191H211"
    fill="none"
    stroke="url(#flow)"
    stroke-width="24"
    stroke-linecap="round"/>

  <circle cx="101" cy="138" r="15" fill="#66e3ff"/>
  <circle cx="211" cy="191" r="13" fill="#4ef2b2"/>
  <circle cx="217" cy="244" r="15" fill="#ff5db8"/>
  <circle cx="101" cy="255" r="13" fill="#4ef2b2"/>

  <text
    x="378"
    y="221"
    fill="url(#word)"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="132"
    font-weight="760"
    letter-spacing="0">Flowmux</text>
  <path d="M382 258H900" stroke="#d9e2ec" stroke-width="8" stroke-linecap="round"/>
  <path d="M382 258H635" stroke="url(#flow)" stroke-width="8" stroke-linecap="round"/>
</svg>
