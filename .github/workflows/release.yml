name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Cargo and build state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
            vendor/ghostty-prefetch/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock', 'tools/prefetch-libghostty-vt.sh', 'tools/build-release-prefetched-libghostty-vt.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Fetch dependencies
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Build release binary
        run: ./tools/build-release-prefetched-libghostty-vt.sh --target ${{ matrix.target }}

      - name: Package release artifact
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_dir="dist/flowmux-${VERSION}-${TARGET}"
          mkdir -p "$package_dir"
          cp target/"$TARGET"/release/flowmux "$package_dir"/flowmux
          cp README.md "$package_dir"/README.md
          tar -C dist -czf "dist/flowmux-${VERSION}-${TARGET}.tar.gz" "$(basename "$package_dir")"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowmux-${{ matrix.target }}
          path: dist/flowmux-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flowmux-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
