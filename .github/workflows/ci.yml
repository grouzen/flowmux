name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_name: x86_64-unknown-linux-gnu
            primary_target: x86_64-unknown-linux-gnu
            install_targets: x86_64-unknown-linux-gnu
            fetch_targets: x86_64-unknown-linux-gnu
            build_script: ./tools/build-release-prefetched-libghostty-vt.sh --target x86_64-unknown-linux-gnu
            package_binary: target/x86_64-unknown-linux-gnu/release/flowmux
          - runner: macos-latest
            artifact_name: universal2-apple-darwin
            primary_target: aarch64-apple-darwin
            install_targets: aarch64-apple-darwin,x86_64-apple-darwin
            fetch_targets: aarch64-apple-darwin x86_64-apple-darwin
            build_script: ./tools/build-universal-macos-prefetched-libghostty-vt.sh
            package_binary: target/universal2-apple-darwin/release/flowmux

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.install_targets }}

      - name: Verify Rust target stdlibs
        run: |
          set -euo pipefail
          rustup show active-toolchain
          rustup target list --installed
          for target in ${{ matrix.fetch_targets }}; do
            rustc --print target-libdir --target "$target" >/dev/null
          done

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Cargo and build state
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
            vendor/ghostty-prefetch/
          key: ${{ runner.os }}-${{ matrix.artifact_name }}-cargo-${{ hashFiles('Cargo.lock', 'tools/prefetch-libghostty-vt.sh', 'tools/build-release-prefetched-libghostty-vt.sh', 'tools/build-universal-macos-prefetched-libghostty-vt.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.artifact_name }}-cargo-

      - name: Fetch dependencies
        run: |
          set -euo pipefail
          for target in ${{ matrix.fetch_targets }}; do
            cargo fetch --locked --target "$target"
          done

      - name: Prefetch Ghostty build inputs
        run: ./tools/prefetch-libghostty-vt.sh

      - name: Export Ghostty build environment
        run: |
          echo "GHOSTTY_SOURCE_DIR=$GITHUB_WORKSPACE/vendor/ghostty-prefetch/ghostty-src" >> "$GITHUB_ENV"
          echo "GHOSTTY_ZIG_SYSTEM_DIR=$GITHUB_WORKSPACE/vendor/ghostty-prefetch/zig-system" >> "$GITHUB_ENV"
          echo "LIBGHOSTTY_VT_SYS_OPTIMIZE=ReleaseFast" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --locked --target ${{ matrix.primary_target }}

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features --target ${{ matrix.primary_target }} -- -D warnings

      - name: Build release binary
        run: ${{ matrix.build_script }}

      - name: Package artifact
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          PACKAGE_BINARY: ${{ matrix.package_binary }}
        run: |
          set -euo pipefail
          version="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          package_dir="dist/flowmux-${version}-${ARTIFACT_NAME}"
          mkdir -p "$package_dir"
          cp "$PACKAGE_BINARY" "$package_dir"/flowmux
          cp README.md "$package_dir"/README.md
          tar -C dist -czf "dist/flowmux-${version}-${ARTIFACT_NAME}.tar.gz" "$(basename "$package_dir")"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowmux-${{ matrix.artifact_name }}
          path: dist/flowmux-*.tar.gz
          if-no-files-found: error
